.bg{background:var(--greenl);color:var(--green);}

.bb{background:var(--bluel);color:var(--blue);}

.bx{background:#F1F5F9;color:#64748B;}
.grid{display:grid;gap:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

.metric-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;}

<!-- WATCHDOG — runs first, before anything else, so it can catch failures
     even if a later script never runs at all (e.g. a CDN script blocked
     by an ad-blocker or network issue, which throws no JS error). -->
<script>
(function(){
  window.__NJP_STARTED = false;
  window.onerror = function(msg, url, line, col, err){
    showDiag('A script error occurred', msg + ' (line ' + line + ')');
    return false;
  };
  window.addEventListener('unhandledrejection', function(e){
    // Only escalate to the full diagnostic screen if the app never started at all —
    // once running, individual save/load failures show their own small alert instead.
    if (!window.__NJP_STARTED){
      showDiag('A background task failed while starting', String((e.reason && e.reason.message) || e.reason || 'Unknown error'));
    } else {
      console.warn('Unhandled rejection:', e.reason);
    }
  });
  function showDiag(title, detail){
    var root = document.getElementById('root');
    if (!root) return;
    root.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0D1B2A;font-family:-apple-system,sans-serif;">' +
      '<div style="max-width:520px;background:#fff;border-radius:14px;padding:28px;text-align:center;">' +
      '<div style="font-size:32px;margin-bottom:10px;">&#9888;&#65039;</div>' +
      '<div style="font-weight:800;font-size:16px;color:#0D1B2A;margin-bottom:10px;">' + title + '</div>' +
      '<div style="font-size:12px;color:#4A5568;line-height:1.6;margin-bottom:14px;font-family:monospace;background:#F7F9FC;padding:10px;border-radius:8px;text-align:left;word-break:break-word;">' + detail + '</div>' +
      '<div style="font-size:12px;color:#94A3B8;text-align:left;">Things to try:<br>' +
      '&#8226; Make sure you are opening the live website link, not a downloaded file<br>' +
      '&#8226; Disable any ad blocker or content blocker for this site (they sometimes block script files needed to run the app)<br>' +
      '&#8226; Try a different browser or a private/incognito window<br>' +
      '&#8226; Check your internet connection is stable' +
      '</div></div></div>';
  }
  setTimeout(function(){
    if (!window.__NJP_STARTED){
      showDiag(
        'The CRM is taking too long to start',
        'One of the required files (React, Supabase, or the app itself) did not finish loading within 8 seconds. This is usually caused by an ad blocker, a firewall, or a network issue blocking one of the required script files.'
      );
    }
  }, 8000);
})();
</script>

function fmt12(t){ if(!t) return ''; var p=t.split(':'); var h=parseInt(p[0])||0,m=parseInt(p[1])||0; var ap=h>=12?'PM':'AM'; var h12=h%12||12; return h12+':'+(m<10?'0':'')+m+' '+ap; }

<script type="text/babel" data-presets="react">

var SUPABASE_URL = 'https://kmohglnqjoyuaqijbeuq.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imttb2hnbG5xam95dWFxaWpiZXVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NTE4NTEsImV4cCI6MjA5NzEyNzg1MX0.w0K_W7I3l2Pobhnt9i4aLud29_sQNqVDeERbSw6a9nc';

var TABLES = ['v2_customers','v2_leads','v2_services','v2_jobs','v2_quotes','v2_invoices','v2_revenues','v2_expenses','v2_equipment','v2_comms','v2_map_pins'];

var DataContext = React.createContext(null);
function useData(){ return React.useContext(DataContext); }

function DataProvider(props){
  var _s = React.useState({}), state = _s[0], setState = _s[1];
  var _l = React.useState(true), loading = _l[0], setLoading = _l[1];

  React.useEffect(function(){
    var mounted = true;
    async function loadAll(){
      var next = {};
      for (var i=0;i<TABLES.length;i++){
        var t = TABLES[i];
        try{
          var res = await sb.from(t).select('*').order('created_at', {ascending:false, nullsFirst:false});
          if (res.error){ console.warn('load', t, res.error.message); next[t] = []; }
          else next[t] = (res.data || []);
        }catch(e){ console.warn('load failed', t, e); next[t] = []; }
      }
      if (mounted){ setState(next); setLoading(false); }
    }
    loadAll();

    // Realtime: refresh a single table on any change to it
    var channel = sb.channel('njps_v2_realtime');
    TABLES.forEach(function(t){
      channel.on('postgres_changes', {event:'*', schema:'public', table:t}, function(){
        sb.from(t).select('*').order('created_at',{ascending:false, nullsFirst:false}).then(function(res){
          if (mounted) setState(function(prev){ var n=Object.assign({},prev); n[t]=res.data||[]; return n; });
        });
      });
    });
    channel.subscribe();

    return function(){ mounted=false; sb.removeChannel(channel); };
  }, []);

  async function insert(table, row){
    if (!row.id) row.id = uid();
    var res = await sb.from(table).insert(row).select();
    if (res.error){
      console.warn('insert', table, res.error.message);
      alert('Could not save: ' + res.error.message);
      throw res.error;
    }
    var saved = (res.data && res.data[0]) ? res.data[0] : row; // fall back to what we sent if select-back returns nothing
    setState(function(prev){ var n=Object.assign({},prev); n[table]=[saved].concat(prev[table]||[]); return n; });
    return saved;
  }
  async function update(table, id, patch){
    var res = await sb.from(table).update(patch).eq('id', id).select();
    if (res.error){
      console.warn('update', table, res.error.message);
      alert('Could not save changes: ' + res.error.message);
      throw res.error;
    }
    var saved = (res.data && res.data[0]) ? res.data[0] : null;
    if (saved){
      setState(function(prev){
        var n=Object.assign({},prev);
        n[table] = (prev[table]||[]).map(function(r){ return r.id===id ? saved : r; });
        return n;
      });
    }
    return saved;
  }
  async function remove(table, id){
    var res = await sb.from(table).delete().eq('id', id);
    if (res.error){
      console.warn('delete', table, res.error.message);
      alert('Could not delete: ' + res.error.message);
      throw res.error;
    }
    setState(function(prev){
      var n=Object.assign({},prev);
      n[table] = (prev[table]||[]).filter(function(r){ return r.id!==id; });
      return n;
    });
  }

  var value = {
    data: state, loading: loading,
    customers: state.v2_customers||[], leads: state.v2_leads||[], services: state.v2_services||[],
    jobs: state.v2_jobs||[], quotes: state.v2_quotes||[], invoices: state.v2_invoices||[],
    revenues: state.v2_revenues||[], expenses: state.v2_expenses||[], equipment: state.v2_equipment||[],
    comms: state.v2_comms||[], mapPins: state.v2_map_pins||[],
    insert: insert, update: update, remove: remove,
    getCustomer: function(id){ return (state.v2_customers||[]).find(function(c){return c.id===id;}) || {id:'', first_name:'Unknown', last_name:'', address:'', phone:'', email:''}; }
  };

  return React.createElement(DataContext.Provider, {value:value}, props.children);
}

// ── One-time migration from the legacy single-table crm_sync store ──
async function migrateLegacyData(onProgress){
  var log = onProgress || function(){};
  var res = await sb.from('crm_sync').select('key,value');
  if (res.error){ log('Could not read legacy data: '+res.error.message); return; }
  var byKey = {}; (res.data||[]).forEach(function(r){ byKey[r.key]=r.value; });

  var custMap = {}; // old id -> new id (same id, kept identical)
  var legacyCustomers = byKey.customers || [];
  log('Migrating '+legacyCustomers.length+' customers…');
  for (var i=0;i<legacyCustomers.length;i++){
    var c = legacyCustomers[i];
    custMap[c.id] = c.id;
    await sb.from('v2_customers').upsert({
      id: c.id, first_name: c.first||'', last_name: c.last||'', phone: c.phone||'',
      email: c.email||'', address: c.address||'', notes: c.notes||''
    }, {onConflict:'id'});
  }

  var legacyJobs = byKey.jobs || [];
  log('Migrating '+legacyJobs.length+' jobs…');
  for (i=0;i<legacyJobs.length;i++){
    var j = legacyJobs[i];
    await sb.from('v2_jobs').upsert({
      id:j.id, customer_id:j.customer||null, service_name:j.service||'', date:j.date||null,
      time:j.time||'09:00', duration:j.duration||2, price:j.price||0, crew_id:j.crew||'',
      status:j.status||'scheduled', notes:j.notes||'',
      photos_before: j.photosBefore||[], photos_after: j.photosAfter||[], recur: j.recur||'none',
      created_at: j.date ? (j.date+'T'+(j.time||'09:00')+':00') : undefined
    }, {onConflict:'id'});
  }

  var legacyRev = byKey.revenues || [];
  log('Migrating '+legacyRev.length+' revenue entries…');
  for (i=0;i<legacyRev.length;i++){
    var r = legacyRev[i];
    await sb.from('v2_revenues').upsert({
      id:r.id, date:r.date||null, descr:r.desc||'', category:r.category||'other',
      amount:r.amount||0, source:r.source||'', customer_id:r.customer||'', auto_key:r.autoKey||'',
      created_at: r.date ? (r.date+'T12:00:00') : undefined
    }, {onConflict:'id'});
  }

  var legacyExp = byKey.expenses || [];
  log('Migrating '+legacyExp.length+' expenses…');
  for (i=0;i<legacyExp.length;i++){
    var e = legacyExp[i];
    await sb.from('v2_expenses').upsert({
      id:e.id, date:e.date||null, descr:e.desc||'', category:e.category||'other',
      amount:e.amount||0, recurring:e.recur||'none',
      created_at: e.date ? (e.date+'T12:00:00') : undefined
    }, {onConflict:'id'});
  }

  var legacyQuotes = byKey.quotes || [];
  log('Migrating '+legacyQuotes.length+' quotes…');
  for (i=0;i<legacyQuotes.length;i++){
    var q = legacyQuotes[i];
    await sb.from('v2_quotes').upsert({
      id:q.id, num:q.num||null, customer_id:q.customer||null, items:q.items||[],
      subtotal:q.subtotal||0, tax:q.tax||0, total:q.total||0, status:q.status||'draft',
      date:q.date||null, notes:q.notes||'',
      created_at: q.date ? (q.date+'T12:00:00') : undefined
    }, {onConflict:'id'});
  }

  var legacyInv = byKey.invoices || [];
  log('Migrating '+legacyInv.length+' invoices…');
  for (i=0;i<legacyInv.length;i++){
    var inv = legacyInv[i];
    await sb.from('v2_invoices').upsert({
      id:inv.id, num:inv.num||null, customer_id:inv.customer||null, service:inv.service||'',
      amount:inv.amount||0, due:inv.due||null, status:inv.status||'sent', notes:inv.notes||'',
      created_at: inv.due ? (inv.due+'T12:00:00') : undefined
    }, {onConflict:'id'});
  }

  var legacyPins = byKey.mapPins || [];
  log('Migrating '+legacyPins.length+' map pins…');
  for (i=0;i<legacyPins.length;i++){
    var p = legacyPins[i];
    await sb.from('v2_map_pins').upsert({
      id:p.id, lat:p.lat, lng:p.lng, addr:p.addr||'', status:p.status||'not-visited',
      notes:p.notes||'', customer_id:p.custId||'', date:p.date||null,
      created_at: p.date ? (p.date+'T12:00:00') : undefined
    }, {onConflict:'id'});
  }

  log('Migration complete!');
}

// AUTH — Supabase Auth (email/password + Google) + PIN quick-login
// Roles: owner | Sales Rep | Technician  (crew role field distinguishes the latter two)
// ═══════════════════════════════════════════════════════════════
var AuthContext = React.createContext(null);
function useAuth(){ return React.useContext(AuthContext); }

function AuthProvider(props){
  var _p = React.useState(null), profile = _p[0], setProfile = _p[1]; // {..., __role: 'owner'|'crew', role: 'Sales Rep'|'Technician'|...}
  var _s = React.useState(null), session = _s[0], setSession = _s[1];
  var _l = React.useState(true), loading = _l[0], setLoading = _l[1];
  // Refs mirror the state above but update synchronously — used inside functions
  // (createProfile, savePin) that may be called back-to-back before a re-render
  // happens, where reading the React state directly would see a stale closure.
  var sessionRef = React.useRef(null);
  var profileRef = React.useRef(null);

  async function resolveSession(sess){
    sessionRef.current = sess;
    setSession(sess);
    var userId = sess.user.id, email = sess.user.email;
    try{
      var ownerRes = await sb.from('app_owners').select('*').eq('user_id', userId).maybeSingle();
      if (ownerRes.data){
        var op = Object.assign({}, ownerRes.data, {__role:'owner'});
        profileRef.current = op; setProfile(op); setLoading(false); return op;
      }
    }catch(e){}
    try{
      var crewRes = await sb.from('app_crew').select('*').eq('user_id', userId).maybeSingle();
      if (crewRes.data){
        var cp = Object.assign({}, crewRes.data, {__role:'crew'});
        profileRef.current = cp; setProfile(cp); setLoading(false); return cp;
      }
    }catch(e){}
    setLoading(false);
    return null; // brand-new user, no profile row yet — signup flow will create one
  }

  React.useEffect(function(){
    var mounted = true;
    sb.auth.getSession().then(function(res){
      var sess = res.data && res.data.session;
      if (sess && mounted) resolveSession(sess);
      else if (mounted) setLoading(false);
    });
    var sub = sb.auth.onAuthStateChange(function(event, sess){
      if (event === 'SIGNED_IN' && sess) resolveSession(sess);
      else if (event === 'SIGNED_OUT'){ setSession(null); setProfile(null); }
    });
    return function(){ mounted=false; try{ sub.data.subscription.unsubscribe(); }catch(e){} };
  }, []);

  async function createProfile(kind, extra){
    var sess = sessionRef.current; if (!sess) return null;
    var userId = sess.user.id, email = sess.user.email;
    if (kind === 'owner'){
      var row = {user_id:userId, email:email, first_name:(extra&&extra.first)||email.split('@')[0], pin:''};
      var r1 = await sb.from('app_owners').insert(row);
      if (r1.error){ console.warn('createProfile owner insert failed:', r1.error.message); return null; }
      var p = Object.assign({}, row, {__role:'owner'});
      profileRef.current = p; setProfile(p); return p;
    } else {
      var crow = {
        user_id:userId, email:email, first_name:(extra&&extra.first)||email.split('@')[0],
        last_name:(extra&&extra.last)||'', phone:'', role:(extra&&extra.jobRole)||'Technician',
        status:'active', pin:'', hourly_rate:0
      };
      var r2 = await sb.from('app_crew').insert(crow);
      if (r2.error){ console.warn('createProfile crew insert failed:', r2.error.message); return null; }
      var cp = Object.assign({}, crow, {__role:'crew'});
      profileRef.current = cp; setProfile(cp); return cp;
    }
  }

  async function savePin(pin){
    var p0 = profileRef.current; if (!p0) return {ok:false, error:'No profile loaded.'};
    var table = p0.__role==='owner' ? 'app_owners' : 'app_crew';
    // Check this PIN isn't already used by someone else in the same table
    // (PIN login looks up by pin alone, so two people sharing one PIN would
    // break login for both — catch it here with a clear message instead).
    var existing = await sb.from(table).select('user_id').eq('pin', pin).neq('user_id', p0.user_id).maybeSingle();
    if (existing.data){ return {ok:false, error:'That PIN is already in use by someone else. Please choose a different one.'}; }
    var res = await sb.from(table).update({pin:pin}).eq('user_id', p0.user_id);
    if (res.error){ return {ok:false, error:res.error.message}; }
    var updated = Object.assign({}, p0, {pin:pin});
    profileRef.current = updated; setProfile(updated);
    return {ok:true};
  }

  async function pinLogin(role, pin){
    var table = role==='owner' ? 'app_owners' : 'app_crew';
    var res = await sb.from(table).select('*').eq('pin', pin).maybeSingle();
    if (res.data){
      var p = Object.assign({}, res.data, {__role: role});
      var fakeSess = {user:{id:res.data.user_id, email:res.data.email}, __pinSession:true};
      profileRef.current = p; sessionRef.current = fakeSess;
      setProfile(p);
      // Fabricate a lightweight session marker so ProtectedRoute treats user as logged in
      setSession(fakeSess);
      return p;
    }
    return null;
  }

  async function signOut(){
    try{ await sb.auth.signOut(); }catch(e){}
    sessionRef.current = null; profileRef.current = null;
    setSession(null); setProfile(null);
  }

  var value = {
    session:session, profile:profile, loading:loading,
    role: profile ? (profile.__role==='owner' ? 'owner' : (profile.role==='Sales Rep' ? 'sales' : 'tech')) : null,
    resolveSession:resolveSession, createProfile:createProfile, savePin:savePin,
    pinLogin:pinLogin, signOut:signOut
  };
  return React.createElement(AuthContext.Provider, {value:value}, props.children);
}


</script>
<script type="text/babel" data-presets="react">

// ── Minimal built-in hash router ──────────────────────────────────

// covers everything needed while removing an external CDN dependency that
// proved unreliable across different builds/versions in the wild.
var RouterContext = React.createContext(null);

function parseHash(){
  var h = window.location.hash || '#/';
  h = h.replace(/^#/, '');
  if (h.charAt(0) !== '/') h = '/' + h;
  var qIdx = h.indexOf('?');
  var pathname = qIdx === -1 ? h : h.slice(0, qIdx);
  var search = qIdx === -1 ? '' : h.slice(qIdx);
  if (pathname.length > 1 && pathname.charAt(pathname.length-1) === '/') pathname = pathname.slice(0, -1);
  return { pathname: pathname || '/', search: search };
}

function HashRouter(props){
  var _loc = React.useState(parseHash), loc = _loc[0], setLoc = _loc[1];
  React.useEffect(function(){
    function onChange(){ setLoc(parseHash()); }
    window.addEventListener('hashchange', onChange);
    return function(){ window.removeEventListener('hashchange', onChange); };
  }, []);
  function navigate(to, opts){
    var clean = to.charAt(0) === '/' ? to : '/' + to;
    if (opts && opts.replace){
      var url = window.location.pathname + window.location.search + '#' + clean;
      window.history.replaceState(null, '', url);
      setLoc(parseHash());

    }

  return React.createElement(RouterContext.Provider, {value:value}, props.children);
}

function useNavigate(){
  var ctx = React.useContext(RouterContext);
  return function(to, opts){ ctx.navigate(to, opts); };
}
function useLocation(){
  var ctx = React.useContext(RouterContext);
  return { pathname: ctx.pathname, search: ctx.search };
}
function useParams(){ return {}; } // not used anywhere in this app (no dynamic routes)

function Link(props){
  var ctx = React.useContext(RouterContext);
  function onClick(e){
    e.preventDefault();
    ctx.navigate(props.to);
  }
  var rest = Object.assign({}, props);
  delete rest.to; delete rest.children;
  return React.createElement('a', Object.assign({href:'#'+props.to, onClick:onClick}, rest), props.children);
}

function Navigate(props){
  var ctx = React.useContext(RouterContext);
  React.useEffect(function(){ ctx.navigate(props.to, {replace: props.replace}); }, []);
  return null;
}

// Exact static-path matching only (sufficient — this app has no dynamic route segments)

<script type="text/babel" data-presets="react">
// ═══════════════════════════════════════════════════════════════
// DASHBOARD — role-specific
// ═══════════════════════════════════════════════════════════════
function DashboardPage(){
  var auth = useAuth();
  if (auth.role === 'owner') return <OwnerDashboard/>;
  if (auth.role === 'sales') return <SalesDashboard/>;
  return <TechDashboard/>;
}

function pageHead(title, sub){
  return <div style={{marginBottom:18}}>
    <div style={{fontSize:22,fontWeight:800,color:'var(--navy)'}}>{title}</div>
    {sub ? <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>{sub}</div> : null}
  </div>;
}

function OwnerDashboard(){
  var d = useData();
  var t = today();
  var todaysRev = d.revenues.filter(function(r){return r.date===t;}).reduce(function(s,r){return s+Number(r.amount||0);},0);
  var jobsCompletedToday = d.jobs.filter(function(j){return j.date===t && j.status==='completed';}).length;
  var quotesAwaiting = d.quotes.filter(function(q){return q.status==='sent';}).length;
  var pipelineValue = d.leads.filter(function(l){return l.stage!=='won'&&l.stage!=='lost';}).reduce(function(s,l){return s+Number(l.est_value||0);},0);
  var outstandingInv = d.invoices.filter(function(i){return i.status!=='paid';}).reduce(function(s,i){return s+Number(i.amount||0);},0);
  var equipNeedsAttn = d.equipment.filter(function(e){return e.status==='needs_service'||e.status==='in_repair';}).length;

  var thisMonth = t.slice(0,7);
  var lastMonthDate = new Date(); lastMonthDate.setMonth(lastMonthDate.getMonth()-1);
  var lastMonth = lastMonthDate.toISOString().slice(0,7);
  var monthRev = d.revenues.filter(function(r){return (r.date||'').slice(0,7)===thisMonth;}).reduce(function(s,r){return s+Number(r.amount||0);},0);
  var monthExp = d.expenses.filter(function(e){return (e.date||'').slice(0,7)===thisMonth;}).reduce(function(s,e){return s+Number(e.amount||0);},0);
  var monthProfit = monthRev - monthExp;
  var prevMonthRev = d.revenues.filter(function(r){return (r.date||'').slice(0,7)===lastMonth;}).reduce(function(s,r){return s+Number(r.amount||0);},0);
  var revGrowth = prevMonthRev>0 ? Math.round((monthRev-prevMonthRev)/prevMonthRev*100) : (monthRev>0?100:0);
  var monthJobs = d.jobs.filter(function(j){return j.status==='completed' && (j.date||'').slice(0,7)===thisMonth;});
  var avgTicket = monthJobs.length ? monthJobs.reduce(function(s,j){return s+Number(j.price||0);},0)/monthJobs.length : 0;
  var newCustomersThisMonth = d.customers.filter(function(c){return (c.created_at||'').slice(0,7)===thisMonth;}).length;

  var ratedJobs = d.jobs.filter(function(j){return j.rating;});
  var avgRating = ratedJobs.length ? (ratedJobs.reduce(function(s,j){return s+Number(j.rating||0);},0)/ratedJobs.length) : null;

  var byService = {};

  var svcEntries = Object.entries(byService).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxSvc = Math.max.apply(null, svcEntries.map(function(e){return e[1];}).concat([1]));

      <StatCard label="This Month Revenue" value={fmt$(monthRev)} color="var(--green)"/>

    </div>

    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:12,color:'var(--navy)'}}>Monthly KPIs</div>
      <div className="g4">
        <StatCard label="Revenue growth vs last month" value={(revGrowth>=0?'+':'')+revGrowth+'%'} valColor={revGrowth>=0?'var(--green)':'var(--red)'}/>
        <StatCard label="Avg ticket size" value={fmt$(avgTicket)}/>
        <StatCard label="New customers this month" value={newCustomersThisMonth}/>
        <StatCard label="Customer satisfaction" value={avgRating?avgRating.toFixed(1)+' / 5 ⭐':'No ratings yet'} valColor={avgRating&&avgRating<4?'var(--red)':'var(--green)'}/>
      </div>
    </div>

    <div className="g2" style={{marginBottom:14}}>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:12,color:'var(--navy)'}}>Revenue by Service</div>
        {svcEntries.length ? svcEntries.map(function(e){
          return <div key={e[0]} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>{e[0]}</span><span style={{fontWeight:700}}>{fmt$(e[1])}</span></div>
            <div style={{height:8,background:'#F1F5F9',borderRadius:99}}><div style={{height:8,width:(e[1]/maxSvc*100)+'%',background:'var(--gold)',borderRadius:99}}/></div>
          </div>;
        }) : <div className="empty">No completed jobs yet</div>}
      </div>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:12,color:'var(--navy)'}}>Team Productivity Today</div>
        <TeamProductivityMini/>
      </div>
    </div>

    <div className="card">
      <div style={{fontWeight:700,marginBottom:12,color:'var(--navy)'}}>Sales Leaderboard</div>
      <Leaderboard/>
    </div>
  </div>;
}

// ── Weather widget — free Open-Meteo API, no key required — 7-day forecast ──
function weatherIcon(code){
  return code===0?'☀️':code<=3?'🌤️':code<=48?'🌫️':code<=67?'🌧️':code<=77?'❄️':code<=99?'⛈️':'🌤️';
}

function WeatherWidget(){
  var d = useData();
  var _wx = React.useState(null), wx = _wx[0], setWx = _wx[1];
  var _err = React.useState(false), err = _err[0], setErr = _err[1];
  var _expanded = React.useState(false), expanded = _expanded[0], setExpanded = _expanded[1];

  React.useEffect(function(){
    var url = 'https://api.open-meteo.com/v1/forecast?latitude=43.4675&longitude=-79.6877'
      + '&current=temperature_2m,precipitation,weather_code,wind_speed_10m'
      + '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max'
      + '&timezone=America%2FToronto&forecast_days=7';
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
      if (data && data.current && data.daily) setWx(data);
      else setErr(true);
    }).catch(function(){ setErr(true); });
  }, []);

  if (err) return null; // fail silently — weather is a nice-to-have, never block the dashboard
  if (!wx) return <div className="card" style={{marginBottom:14,fontSize:12,color:'var(--t3)'}}>Loading weather…</div>;

  var temp = Math.round(wx.current.temperature_2m);
  var wind = Math.round(wx.current.wind_speed_10m);
  var rainChance = wx.daily.precipitation_probability_max ? wx.daily.precipitation_probability_max[0] : 0;
  var code = wx.current.weather_code;
  var icon = weatherIcon(code);
  var t = today();
  var outdoorJobsToday = d.jobs.filter(function(j){return j.date===t && j.status!=='cancelled' && j.status!=='completed';}).length;
  var risky = (rainChance>=50 || wind>=35) && outdoorJobsToday>0;

function CustomerFormModal(props){
  var d = useData();
  var existing = props.customer || null;
  var _f = React.useState(existing || {
    first_name:'',last_name:'',phone:'',email:'',address:'',property_type:'Residential',
    gate_code:'',pets:'',preferred_contact:'call',referral_source:'',tags:[],notes:'',warranty_info:''
  });
  var f = _f[0], setF = _f[1];
  function upd(k,v){ setF(function(p){var n=Object.assign({},p);n[k]=v;return n;}); }
  function toggleTag(tag){ upd('tags', (f.tags||[]).indexOf(tag)!==-1 ? f.tags.filter(function(t){return t!==tag;}) : (f.tags||[]).concat([tag])); }

  async function save(){
    if (!f.first_name){ alert('Enter a first name'); return; }
    if (existing) await d.update('v2_customers', existing.id, f);
    else await d.insert('v2_customers', f);
    props.onClose();
  }

  async function del(){
    if (!existing) return;
    if (!confirm('Delete '+existing.first_name+' '+existing.last_name+'? Their jobs, quotes, and invoices will remain but will no longer be linked to a customer record. This cannot be undone.')) return;
    await d.remove('v2_customers', existing.id);
    props.onClose();
  }

  return <Modal open title={existing?'Edit customer':'New customer'} onClose={props.onClose} footer={
    <React.Fragment>
      {existing ? <button className="btn btn-danger" onClick={del} style={{marginRight:'auto'}}>Delete customer</button> : null}
      <button className="btn" onClick={props.onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>Save</button>
    </React.Fragment>
  }>
    <div className="g2">
      <Field label="First name *"><input value={f.first_name} onChange={function(e){upd('first_name',e.target.value);}}/></Field>
      <Field label="Last name"><input value={f.last_name} onChange={function(e){upd('last_name',e.target.value);}}/></Field>
      <Field label="Phone"><input value={f.phone} onChange={function(e){upd('phone',e.target.value);}}/></Field>
      <Field label="Email"><input value={f.email} onChange={function(e){upd('email',e.target.value);}}/></Field>
    </div>
    <Field label="Address"><input value={f.address} onChange={function(e){upd('address',e.target.value);}}/></Field>
    <div className="g2">
      <Field label="Property type">
        <select value={f.property_type} onChange={function(e){upd('property_type',e.target.value);}}>
          <option>Residential</option><option>Commercial</option><option>Condo</option><option>HOA</option>
        </select>
      </Field>
      <Field label="Preferred contact">
        <select value={f.preferred_contact} onChange={function(e){upd('preferred_contact',e.target.value);}}>
          <option value="call">Call</option><option value="text">Text</option><option value="email">Email</option>
        </select>
      </Field>
      <Field label="Gate code"><input value={f.gate_code} onChange={function(e){upd('gate_code',e.target.value);}}/></Field>
      <Field label="Pets"><input value={f.pets} onChange={function(e){upd('pets',e.target.value);}} placeholder="e.g. Friendly dog in backyard"/></Field>
    </div>
    <Field label="Referral source"><input value={f.referral_source} onChange={function(e){upd('referral_source',e.target.value);}} placeholder="e.g. Google, door knock, referral"/></Field>
    <Field label="Tags">
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {CUSTOMER_TAGS.map(function(t){
          var on = (f.tags||[]).indexOf(t)!==-1;
          return <button key={t} type="button" className={cls('badge', on?'bb':'bx')} style={{cursor:'pointer',border:'none'}} onClick={function(){toggleTag(t);}}>{t}</button>;
        })}
      </div>
    </Field>
    <Field label="Warranty information"><textarea rows={2} value={f.warranty_info} onChange={function(e){upd('warranty_info',e.target.value);}} placeholder="e.g. 2-year warranty on interlocking work, expires June 2027"/></Field>
    <Field label="Notes"><textarea rows={3} value={f.notes} onChange={function(e){upd('notes',e.target.value);}}/></Field>
  </Modal>;
}

function QuoteFormModal(props){
  var d = useData();
  var existing = props.quote || null;
  var _custId = React.useState(existing ? existing.customer_id : ''), custId = _custId[0], setCustId = _custId[1];
  var _items = React.useState(existing && existing.items && existing.items.length ? existing.items : [{service:'',qty:1,price:0}]), items = _items[0], setItems = _items[1];
  var _sig = React.useState(existing ? (existing.signature||'') : ''), sig = _sig[0], setSig = _sig[1];
  var canvasRef = React.useRef(null);
  var drawing = React.useRef(false);

  // If editing a quote that already has a saved signature, draw it onto the canvas once mounted
  React.useEffect(function(){
    if (existing && existing.signature && canvasRef.current){
      var img = new Image();
      img.onload = function(){ var ctx = canvasRef.current.getContext('2d'); ctx.drawImage(img,0,0); };
      img.src = existing.signature;
    }
  }, []);

  function addItem(){ setItems(items.concat([{service:'',qty:1,price:0}])); }
  function updItem(i,k,v){ setItems(items.map(function(it,idx){ if(idx!==i) return it; var n=Object.assign({},it); n[k]=v; return n; })); }
  function rmItem(i){ setItems(items.filter(function(_,idx){return idx!==i;})); }

  var subtotal = items.reduce(function(s,it){return s+Number(it.qty||0)*Number(it.price||0);},0);
  var tax = Math.round(subtotal*0.13*100)/100;
  var total = subtotal+tax;

  function getPos(e, c){
    var rect = c.getBoundingClientRect();
    return {
      x: (e.touches?e.touches[0].clientX:e.clientX) - rect.left,
      y: (e.touches?e.touches[0].clientY:e.clientY) - rect.top
    };
  }
  function startDraw(e){
    drawing.current=true;
    var c = canvasRef.current; if(!c) return;
    var p = getPos(e, c);
    var ctx = c.getContext('2d');
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
  }
  function endDraw(){ drawing.current=false; var c=canvasRef.current; if(c) setSig(c.toDataURL()); }
  function draw(e){
    if(!drawing.current) return;
    var c = canvasRef.current; if(!c) return;
    var p = getPos(e, c);
    var ctx = c.getContext('2d');
    ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#0D1B2A';
    ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function clearSig(){
    var c=canvasRef.current;
    if(c){ var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); ctx.beginPath(); setSig(''); }
  }

  async function save(){
    if (!custId){ alert('Select a customer'); return; }
    if (existing){
      await d.update('v2_quotes', existing.id, {
        customer_id:custId, items:items, subtotal:subtotal, tax:tax, total:total, signature:sig
      });
    } else {
      var num = Math.floor(1000+Math.random()*9000);
      await d.insert('v2_quotes', {
        num:num, customer_id:custId, items:items, subtotal:subtotal, tax:tax, total:total,
        status:'draft', date: today(), signature: sig
      });
    }
    props.onClose();
  }

  async function del(){
    if (!existing) return;
    if (!confirm('Delete quote #'+existing.num+'? This cannot be undone.')) return;
    await d.remove('v2_quotes', existing.id);
    props.onClose();
  }

  return <Modal open large title={existing?('Edit estimate #'+existing.num):'New estimate'} onClose={props.onClose} footer={
    <React.Fragment>
      {existing ? <button className="btn btn-danger" onClick={del} style={{marginRight:'auto'}}>Delete quote</button> : null}
      <button className="btn" onClick={props.onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>{existing?'Save changes':'Save estimate'}</button>
    </React.Fragment>
  }>
    <Field label="Customer">
      <select value={custId} onChange={function(e){setCustId(e.target.value);}}>
        <option value="">Select customer…</option>
        {d.customers.map(function(c){return <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>;})}
      </select>
    </Field>
    <div style={{fontWeight:700,fontSize:12,margin:'14px 0 8px'}}>Line items</div>
    {items.map(function(it,i){
      return <div key={i} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
        <select value={it.service} onChange={function(e){
          var svc = d.services.find(function(s){return s.name===e.target.value;});
          updItem(i,'service',e.target.value);
          if (svc) updItem(i,'price',svc.base_price);
        }} style={{flex:2}}>
          <option value="">Service…</option>
          {d.services.map(function(s){return <option key={s.id} value={s.name}>{s.name}</option>;})}
        </select>
        <input type="number" value={it.qty} onChange={function(e){updItem(i,'qty',e.target.value);}} style={{width:60}} placeholder="Qty"/>
        <input type="number" value={it.price} onChange={function(e){updItem(i,'price',e.target.value);}} style={{width:90}} placeholder="Price"/>
        <button className="btn btn-sm btn-danger" onClick={function(){rmItem(i);}}>✕</button>
      </div>;
    })}
    <button className="btn btn-sm" onClick={addItem}>+ Add line item</button>

    <div style={{marginTop:14,textAlign:'right',fontSize:13}}>
      <div>Subtotal: {fmt$(subtotal)}</div>
      <div>HST (13%): {fmt$(tax)}</div>
      <div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>Total: {fmt$(total)}</div>
    </div>

    <div style={{fontWeight:700,fontSize:12,margin:'14px 0 8px'}}>Customer signature</div>
    <canvas ref={canvasRef} width={460} height={120} style={{border:'1px solid var(--border)',borderRadius:8,width:'100%',touchAction:'none'}}
      onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
      onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}/>
    <button className="btn btn-sm" style={{marginTop:6}} onClick={clearSig}>Clear signature</button>
  </Modal>;
}

// SCHEDULE — drag-and-drop calendar, week view OR custom date range
// ═══════════════════════════════════════════════════════════════
function getWeekStartISO(){
  var now = new Date(); var day = now.getDay(); var diff = now.getDate()-day;
  return new Date(now.setDate(diff)).toISOString().split('T')[0];
}
function addDaysISO(iso, n){
  var dt = new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()+n);
  return dt.toISOString().split('T')[0];
}
function daysBetween(fromISO, toISO){
  var a = new Date(fromISO+'T00:00:00'), b = new Date(toISO+'T00:00:00');
  return Math.round((b-a)/86400000);
}

function SchedulePage(){
  var d = useData();
  var auth = useAuth();
  var _mode = React.useState('week'), mode = _mode[0], setMode = _mode[1]; // 'week' | 'range'
  var _ws = React.useState(getWeekStartISO), _weekStart = _ws[0], _setWeekStart = _ws[1];
  var _from = React.useState(today), rangeFrom = _from[0], setRangeFrom = _from[1];
  var _to = React.useState(function(){ return addDaysISO(today(), 13); }), rangeTo = _to[0], setRangeTo = _to[1];
  var _crew = React.useState([]), crew = _crew[0], setCrew = _crew[1];
  React.useEffect(function(){ sb.from('app_crew').select('*').eq('status','active').then(function(r){setCrew(r.data||[]);}); }, []);
  var _dragId = React.useState(null), dragId = _dragId[0], setDragId = _dragId[1];

  var days = [];
  if (mode==='week'){
    for (var i=0;i<7;i++) days.push(addDaysISO(_weekStart, i));
  } else {
    var span = daysBetween(rangeFrom, rangeTo);
    var capped = Math.min(Math.max(span,0), 90); // hard safety cap so a huge range can't freeze the page
    for (var j=0;j<=capped;j++) days.push(addDaysISO(rangeFrom, j));
  }

  var visibleJobs = auth.role==='tech' ? d.jobs.filter(function(j){return j.crew_id===auth.profile.user_id;}) : d.jobs;

  function jobsForDay(date){ return visibleJobs.filter(function(j){return j.date===date;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');}); }

  async function dropOnDay(date){
    if (!dragId) return;
    await d.update('v2_jobs', dragId, {date:date});
    setDragId(null);
  }

  function shiftWeek(delta){ _setWeekStart(addDaysISO(_weekStart, delta*7)); }
  function crewName(id){ var c = crew.find(function(x){return x.user_id===id;}); return c ? c.first_name : ''; }

  var STATUS_COLOR = { scheduled:'var(--blue)', 'in-progress':'var(--gold)', completed:'var(--green)', cancelled:'var(--red)' };

  function JobCard(j){
    var c = d.getCustomer(j.customer_id);
    return <div key={j.id} draggable
      onDragStart={function(){setDragId(j.id);}}
      style={{background:'#fff',border:'1px solid var(--border)',borderLeft:'3px solid '+(STATUS_COLOR[j.status]||'var(--border)'),borderRadius:8,padding:6,marginBottom:6,cursor:'grab',fontSize:11}}>
      <div style={{fontWeight:700,color:'var(--navy)'}}>{fmt12(j.time)}</div>
      <div>{c.first_name} {c.last_name}</div>
      <div style={{color:'var(--t3)'}}>{j.service_name}</div>
      {j.crew_id ? <div style={{color:'var(--blue)',marginTop:2}}>👤 {crewName(j.crew_id)}</div> : <div style={{color:'var(--red)'}}>Unassigned</div>}
    </div>;
  }

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:10}}>
      <div style={{fontSize:22,fontWeight:800,color:'var(--navy)'}}>Schedule</div>
      <div className="tabs">
        <button className={cls('tab',mode==='week'&&'active')} onClick={function(){setMode('week');}}>Week view</button>
        <button className={cls('tab',mode==='range'&&'active')} onClick={function(){setMode('range');}}>Custom range</button>
      </div>
    </div>

    {mode==='week' ? (
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <button className="btn btn-sm" onClick={function(){shiftWeek(-1);}}>← Prev week</button>
        <button className="btn btn-sm" onClick={function(){_setWeekStart(getWeekStartISO());}}>This week</button>
        <button className="btn btn-sm" onClick={function(){shiftWeek(1);}}>Next week →</button>
      </div>
    ) : (
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:'var(--t2)'}}>From</span>
        <input type="date" value={rangeFrom} onChange={function(e){setRangeFrom(e.target.value);}} style={{width:150}}/>
        <span style={{fontSize:11,fontWeight:700,color:'var(--t2)'}}>To</span>
        <input type="date" value={rangeTo} onChange={function(e){setRangeTo(e.target.value);}} style={{width:150}}/>
        {daysBetween(rangeFrom,rangeTo) > 90 ? <span style={{fontSize:11,color:'var(--red)'}}>Showing first 90 days of this range — narrow it down to see more precisely.</span> : null}
        <div style={{display:'flex',gap:6,marginLeft:'auto'}}>
          <button className="btn btn-sm" onClick={function(){setRangeFrom(today());setRangeTo(addDaysISO(today(),6));}}>This week</button>
          <button className="btn btn-sm" onClick={function(){setRangeFrom(today());setRangeTo(addDaysISO(today(),29));}}>Next 30 days</button>
          <button className="btn btn-sm" onClick={function(){setRangeFrom(today());setRangeTo(addDaysISO(today(),89));}}>Next 90 days</button>
        </div>
      </div>
    )}

    <div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>Drag a job card onto another day to reschedule it.</div>

    {mode==='week' ? (
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,minWidth:900,overflowX:'auto'}}>
        {days.map(function(date){
          var dt = new Date(date+'T00:00:00');
          var isToday = date===today();
          return <div key={date}
            onDragOver={function(e){e.preventDefault();}}
            onDrop={function(){dropOnDay(date);}}
            style={{background:isToday?'var(--goldl)':'var(--surface)',border:'1px solid '+(isToday?'var(--gold)':'var(--border)'),borderRadius:10,padding:8,minHeight:300}}>
            <div style={{fontSize:11,fontWeight:700,color:isToday?'var(--goldd)':'var(--t2)',marginBottom:8,textAlign:'center'}}>
              {dt.toLocaleDateString('en-CA',{weekday:'short'})}<br/>{dt.getDate()}
            </div>
            {jobsForDay(date).map(JobCard)}
          </div>;
        })}
      </div>
    ) : (
      <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))'}}>
        {days.map(function(date){
          var dt = new Date(date+'T00:00:00');
          var isToday = date===today();
          var jobsThisDay = jobsForDay(date);
          return <div key={date}
            onDragOver={function(e){e.preventDefault();}}
            onDrop={function(){dropOnDay(date);}}
            style={{background:isToday?'var(--goldl)':'var(--surface)',border:'1px solid '+(isToday?'var(--gold)':'var(--border)'),borderRadius:10,padding:8,minHeight:110}}>
            <div style={{fontSize:11,fontWeight:700,color:isToday?'var(--goldd)':'var(--t2)',marginBottom:8}}>
              {dt.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'})}
            </div>
            {jobsThisDay.length ? jobsThisDay.map(JobCard) : <div style={{fontSize:10,color:'var(--t3)'}}>No jobs</div>}
          </div>;
        })}
      </div>
    )}
  </div>;
}

function InvoicesPage(){
  var d = useData();
  var _new = React.useState(false), showNew = _new[0], setShowNew = _new[1];
  var _edit = React.useState(null), editInv = _edit[0], setEditInv = _edit[1];

  var filtered = d.invoices.filter(function(i){return filter==='all'||i.status===filter;});
  var outstanding = d.invoices.filter(function(i){return i.status!=='paid';}).reduce(function(s,i){return s+Number(i.amount||0);},0);

  var markingPaid = React.useRef({});
  async function markPaid(inv, method, e){
    if (e) e.stopPropagation();
    if (inv.status==='paid' || markingPaid.current[inv.id]) return;
    markingPaid.current[inv.id] = true;
    try{
      await d.update('v2_invoices', inv.id, {status:'paid', paid_at:new Date().toISOString(), method:method});
      var c = d.getCustomer(inv.customer_id);
      await d.insert('v2_revenues', {

        amount:inv.amount, source:'invoice', customer_id:inv.customer_id, auto_key:'auto_inv_'+inv.id
      });
    } finally {
      delete markingPaid.current[inv.id];
    }
  }

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>

        return <button key={s} className={cls('tab', filter===s&&'active')} onClick={function(){setFilter(s);}}>{s}</button>;
      })}
    </div>
    <div className="card">
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Amount</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>{filtered.map(function(inv){
          var c = d.getCustomer(inv.customer_id);

            <td>{fmtD(inv.due)}</td>
            <td><span className={cls('badge', inv.status==='paid'?'bg':inv.status==='overdue'?'br':'ba')}>{inv.status}</span></td>
            <td onClick={function(e){e.stopPropagation();}}>
              {inv.status!=='paid' && <select defaultValue="" onChange={function(e){ if(e.target.value) markPaid(inv, e.target.value); }}>
                <option value="">Mark paid via…</option><option value="etransfer">E-Transfer</option><option value="cash">Cash</option><option value="cheque">Cheque</option><option value="card">Card</option>
              </select>}
              {' '}<button className="btn btn-sm" onClick={function(e){e.stopPropagation();setEditInv(inv);}}>Edit</button>
            </td>
          </tr>;
        })}</tbody>
      </table>
      {!filtered.length ? <div className="empty">No invoices</div> : null}
    </div>
    {showNew ? <InvoiceFormModal onClose={function(){setShowNew(false);}}/> : null}
    {editInv ? <InvoiceFormModal invoice={editInv} onClose={function(){setEditInv(null);}}/> : null}
  </div>;

function InvoiceFormModal(props){
  var d = useData();
  var existing = props.invoice || null;
  var _f = React.useState(existing ? {
    customer_id:existing.customer_id, service:existing.service||'', amount:existing.amount||0,
    due:existing.due||today(), notes:existing.notes||''
  } : {customer_id:'',service:'',amount:0,due:today(),notes:''});
  var f = _f[0], setF = _f[1];
  function upd(k,v){ setF(function(p){var n=Object.assign({},p);n[k]=v;return n;}); }

  async function save(){
    if (!f.customer_id){ alert('Select a customer'); return; }
    if (existing){
      await d.update('v2_invoices', existing.id, f);
    } else {
      var num = Math.floor(1000+Math.random()*9000);
      await d.insert('v2_invoices', Object.assign({}, f, {num:num, status:'sent'}));
    }
    props.onClose();
  }

  async function del(){
    if (!existing) return;
    if (!confirm('Delete invoice #'+existing.num+'? This cannot be undone.'+(existing.status==='paid'?' The matching revenue entry will also be removed.':''))) return;
    // If this invoice was paid, remove its auto-generated revenue entry too so totals stay accurate
    if (existing.status==='paid'){
      var match = d.revenues.find(function(r){return r.auto_key==='auto_inv_'+existing.id;});
      if (match) await d.remove('v2_revenues', match.id);
    }
    await d.remove('v2_invoices', existing.id);
    props.onClose();
  }

  return <Modal open title={existing?('Edit invoice #'+existing.num):'New invoice'} onClose={props.onClose} footer={
    <React.Fragment>
      {existing ? <button className="btn btn-danger" onClick={del} style={{marginRight:'auto'}}>Delete invoice</button> : null}
      <button className="btn" onClick={props.onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>{existing?'Save changes':'Create invoice'}</button>
    </React.Fragment>
  }>
    <Field label="Customer">
      <select value={f.customer_id} onChange={function(e){upd('customer_id',e.target.value);}}>
        <option value="">Select…</option>
        {d.customers.map(function(c){return <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>;})}
      </select>
    </Field>
    <Field label="Service description"><input value={f.service} onChange={function(e){upd('service',e.target.value);}}/></Field>
    <div className="g2">
      <Field label="Amount ($)"><input type="number" value={f.amount} onChange={function(e){upd('amount',e.target.value);}}/></Field>
      <Field label="Due date"><input type="date" value={f.due} onChange={function(e){upd('due',e.target.value);}}/></Field>
    </div>
    <Field label="Notes"><textarea rows={2} value={f.notes} onChange={function(e){upd('notes',e.target.value);}}/></Field>
  </Modal>;
}

async function qbSync(action, localId){
  var res = await fetch(QB_SYNC_URL, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + SUPABASE_KEY  // required by Supabase Edge Functions
    },
    body: JSON.stringify({action:action, localId:localId})
  });
  var data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Sync failed');
  return data;
}

              <div style={{width:'100%',height:(x.val/maxMonth*100)+'%',background:'var(--gold)',borderRadius:'4px 4px 0 0',minHeight:2}}/>

            <div style={{fontSize:10,fontWeight:700}}>{fmt$(x.val)}</div>
          </div>;
        })}
      </div>
    </div>

      <div className="card">

          var v = repRevenue(c.user_id);

          return <div key={c.user_id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
            <span>{c.first_name} {c.last_name}</span><b style={{color:'var(--green)'}}>{fmt$(v)}</b>
          </div>;
        })}
      </div>
    </div>

    <div className="g3" style={{marginTop:14}}>

    </div>
  </div>;
}


// ═══════════════════════════════════════════════════════════════
// TERRITORY MAP — Google Maps, accurate geocoding, pin management
// ═══════════════════════════════════════════════════════════════
var PIN_CFG = {
  'not-visited':{color:'#8A94A6',label:'Not visited'},
  'interested':{color:'#D97706',label:'Interested'},
  'quoted':{color:'#C9A84C',label:'Quoted'},
  'booked':{color:'#276749',label:'Booked'},
  'not-interested':{color:'#9B2335',label:'Not interested'},
  'no-answer':{color:'#5A6377',label:'No answer'}
};

function MapPage(){
  var d = useData();
  var mapElRef = React.useRef(null);
  var mapRef = React.useRef(null);
  var geocoderRef = React.useRef(null);
  var markersRef = React.useRef({});
  var _addMode = React.useState(false), addMode = _addMode[0], setAddMode = _addMode[1];
  var _pending = React.useState(null), pending = _pending[0], setPending = _pending[1];
  var _filter = React.useState('all'), filter = _filter[0], setFilter = _filter[1];
  var addModeRef = React.useRef(false);
  React.useEffect(function(){ addModeRef.current = addMode; }, [addMode]);

  React.useEffect(function(){
    function init(){
      if (!window.google || !window.google.maps || !mapElRef.current) { setTimeout(init, 300); return; }
      if (mapRef.current) return;
      mapRef.current = new google.maps.Map(mapElRef.current, {
        center:{lat:43.4675,lng:-79.6877}, zoom:14, mapTypeId:'satellite',
        mapTypeControl:true, mapTypeControlOptions:{style:google.maps.MapTypeControlStyle.HORIZONTAL_BAR, position:google.maps.ControlPosition.TOP_RIGHT, mapTypeIds:['satellite','hybrid','roadmap']},
        streetViewControl:true, fullscreenControl:false
      });
      geocoderRef.current = new google.maps.Geocoder();
      mapRef.current.addListener('click', function(e){
        if (!addModeRef.current) return;
        setAddMode(false);
        var lat = e.latLng.lat(), lng = e.latLng.lng();
        geocoderRef.current.geocode({location:{lat:lat,lng:lng}}, function(results, status){
          var addr = (status==='OK' && results && results[0]) ? results[0].formatted_address : '';
          setPending({lat:lat, lng:lng, addr:addr});
        });
      });
      renderMarkers();
    }
    init();
  }, []);

  function renderMarkers(){
    if (!mapRef.current) return;
    Object.values(markersRef.current).forEach(function(m){ m.setMap(null); });
    markersRef.current = {};
    var pins = d.mapPins.filter(function(p){ return filter==='all' || p.status===filter; });
    pins.forEach(function(p){
      var cfg = PIN_CFG[p.status] || PIN_CFG['not-visited'];
      var marker = new google.maps.Marker({
        position:{lat:p.lat, lng:p.lng}, map:mapRef.current,
        icon:{path:google.maps.SymbolPath.CIRCLE, scale:9, fillColor:cfg.color, fillOpacity:1, strokeColor:'#fff', strokeWeight:2}
      });
      marker.addListener('click', function(){ setPending(p); });
      markersRef.current[p.id] = marker;
    });
  }
  React.useEffect(renderMarkers, [d.mapPins, filter]);

  function startAdd(){ setAddMode(true); }

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:10}}>
      <div style={{fontSize:22,fontWeight:800,color:'var(--navy)'}}>Territory Map</div>
      <button className="btn btn-gold" onClick={startAdd}>{addMode?'Click a spot on the map…':'+ Mark house'}</button>
    </div>
    <div className="tabs" style={{marginBottom:10}}>
      <button className={cls('tab',filter==='all'&&'active')} onClick={function(){setFilter('all');}}>All</button>
      {Object.keys(PIN_CFG).map(function(k){
        return <button key={k} className={cls('tab',filter===k&&'active')} onClick={function(){setFilter(k);}}>{PIN_CFG[k].label}</button>;
      })}
    </div>
    <div ref={mapElRef} style={{height:560,width:'100%',borderRadius:12,border:'1px solid var(--border)'}}/>
    {pending ? <PinModal pending={pending} onClose={function(){setPending(null);}}/> : null}
  </div>;
}

function PinModal(props){
  var d = useData();
  var p = props.pending;
  var isNew = !p.id;
  var _f = React.useState({addr:p.addr||'', status:p.status||'not-visited', notes:p.notes||'', customer_id:p.customer_id||''});
  var f = _f[0], setF = _f[1];
  function upd(k,v){ setF(function(prev){var n=Object.assign({},prev);n[k]=v;return n;}); }
  var _newCust = React.useState(false), isNewCust = _newCust[0], setIsNewCust = _newCust[1];
  var _nc = React.useState({first_name:'', last_name:'', phone:''});
  var nc = _nc[0], setNc = _nc[1];

  async function save(){
    var custId = f.customer_id;
    if (isNewCust){
      if (!nc.first_name){ alert("Enter the new customer's first name"); return; }
      var created = await d.insert('v2_customers', {
        first_name: nc.first_name, last_name: nc.last_name, phone: nc.phone, address: f.addr
      });
      custId = created.id;
    }
    if (isNew) await d.insert('v2_map_pins', {lat:p.lat, lng:p.lng, addr:f.addr, status:f.status, notes:f.notes, customer_id:custId, date:today()});
    else await d.update('v2_map_pins', p.id, {addr:f.addr, status:f.status, notes:f.notes, customer_id:custId});
    props.onClose();
  }
  async function remove(){
    if (!isNew) await d.remove('v2_map_pins', p.id);
    props.onClose();
  }

  return <Modal open title={isNew?'Mark this house':f.addr||'Edit pin'} onClose={props.onClose} footer={
    <React.Fragment>
      {!isNew ? <button className="btn btn-danger" onClick={remove} style={{marginRight:'auto'}}>Remove</button> : null}
      <button className="btn" onClick={props.onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>Save</button>
    </React.Fragment>
  }>
    <Field label="Address"><input value={f.addr} onChange={function(e){upd('addr',e.target.value);}}/></Field>
    <Field label="Status">
      <select value={f.status} onChange={function(e){upd('status',e.target.value);}}>
        {Object.entries(PIN_CFG).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].label}</option>;})}
      </select>
    </Field>
    <Field label="Link to customer">
      <select value={isNewCust?'__new__':f.customer_id} onChange={function(e){
        if (e.target.value==='__new__'){ setIsNewCust(true); } else { setIsNewCust(false); upd('customer_id', e.target.value); }
      }}>
        <option value="">None</option>
        {d.customers.map(function(c){return <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>;})}
        <option value="__new__">+ New customer…</option>
      </select>
    </Field>
    {isNewCust && <div className="g2" style={{background:'var(--goldl)',padding:10,borderRadius:8,marginBottom:10}}>
      <Field label="First name *"><input value={nc.first_name} onChange={function(e){setNc(Object.assign({},nc,{first_name:e.target.value}));}}/></Field>
      <Field label="Last name"><input value={nc.last_name} onChange={function(e){setNc(Object.assign({},nc,{last_name:e.target.value}));}}/></Field>
      <Field label="Phone"><input value={nc.phone} onChange={function(e){setNc(Object.assign({},nc,{phone:e.target.value}));}}/></Field>
      <div style={{fontSize:11,color:'var(--t2)',alignSelf:'flex-end',paddingBottom:8}}>Address will be set to: {f.addr||'(pin location)'}</div>
    </div>}
    <Field label="Notes"><textarea rows={2} value={f.notes} onChange={function(e){upd('notes',e.target.value);}}/></Field>
  </Modal>;
}

function LoginPage(){
  var auth = useAuth();
  var navigate = useNavigate();
  var _role = React.useState('owner'), roleTab = _role[0], setRoleTab = _role[1];
  var _mode = React.useState('signin'), mode = _mode[0], setMode = _mode[1];
  var _err = React.useState(''), err = _err[0], setErr = _err[1];
  var _needsPin = React.useState(false), needsPin = _needsPin[0], setNeedsPin = _needsPin[1];
  var _pendingKind = React.useState(null), pendingKind = _pendingKind[0], setPendingKind = _pendingKind[1];

  var _f = React.useState({email:'',pass:'',first:'',last:'',jobRole:'Technician',pin:'',pinInput:'',pinConfirm:''});
  var f = _f[0], setF = _f[1];
  function upd(k,v){ setF(function(prev){ var n=Object.assign({},prev); n[k]=v; return n; }); }

  React.useEffect(function(){
    if (auth.profile && !auth.profile.pin && !needsPin){ setNeedsPin(true); setPendingKind(auth.profile.__role); }
    else if (auth.profile && auth.profile.pin){ navigate('/', {replace:true}); }
  }, [auth.profile]);

  async function doSignIn(){
    setErr('');
    if (!f.email || !f.pass){ setErr('Enter your email and password.'); return; }
    var res = await sb.auth.signInWithPassword({email:f.email, password:f.pass});
    if (res.error){ setErr(res.error.message); return; }
    await auth.resolveSession(res.data.session);
  }

  var _busy = React.useState(false), busy = _busy[0], setBusy = _busy[1];

  async function doSignUp(){
    setErr('');
    if (!f.first){ setErr('Enter your first name.'); return; }
    if (!f.email || !f.pass || f.pass.length<6){ setErr('Enter an email and a password (6+ characters).'); return; }
    setBusy(true);
    try{
      var res = await sb.auth.signUp({email:f.email, password:f.pass});
      if (res.error){ setErr(res.error.message); return; }
      if (!res.data.session){ setErr('Check your email to confirm your account, then sign in.'); return; }
      await auth.resolveSession(res.data.session);
      var created = await auth.createProfile(roleTab, {first:f.first, last:f.last, jobRole:f.jobRole});
      if (!created){ setErr('Your login was created, but setting up your profile failed. Please try signing in again, or contact support if this keeps happening.'); return; }
    } finally {
      setBusy(false);
    }
  }

  async function doGoogle(){
    setErr('');
    var res = await sb.auth.signInWithOAuth({provider:'google', options:{redirectTo: window.location.origin + window.location.pathname}});
    if (res.error) setErr(res.error.message);
  }

  async function doPinLogin(){
    setErr('');
    if (!f.pinInput){ return; }
    var p = await auth.pinLogin(roleTab, f.pinInput);
    if (!p){ setErr('PIN not recognized.'); upd('pinInput',''); return; }
  }

  async function savePinSetup(){
    if (f.pin.length<4 || f.pin.length>6 || !/^\d+$/.test(f.pin)){ setErr('PIN must be 4–6 digits.'); return; }
    if (f.pin !== f.pinConfirm){ setErr('PINs do not match.'); return; }
    var result = await auth.savePin(f.pin);
    if (!result || !result.ok){ setErr((result && result.error) || 'Could not save PIN. Please try again.'); return; }
    navigate('/', {replace:true});
  }

  if (needsPin){
    return <div style={wrapStyle}>
      <Brand/>
      <div style={cardStyle}>
        <div style={{padding:'22px 24px'}}>
          <div style={{fontWeight:800,fontSize:16,marginBottom:6,color:'var(--navy)'}}>🔒 Set your login PIN</div>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:16,lineHeight:1.6}}>Create a 4–6 digit PIN for quick sign-in from now on.</div>
          <Field label="Choose a PIN"><input inputMode="numeric" maxLength={6} value={f.pin} onChange={function(e){upd('pin',e.target.value.replace(/\D/g,''));}} style={pinInputStyle}/></Field>
          <Field label="Confirm PIN"><input inputMode="numeric" maxLength={6} value={f.pinConfirm} onChange={function(e){upd('pinConfirm',e.target.value.replace(/\D/g,''));}} style={pinInputStyle}/></Field>
          {err ? <div style={errStyle}>{err}</div> : null}
          <button className="btn btn-primary" style={{width:'100%',marginTop:10,padding:12}} onClick={savePinSetup}>Save PIN &amp; continue</button>
        </div>
      </div>
    </div>;
  }

  return <div style={wrapStyle}>
    <Brand/>
    <div style={cardStyle}>
      <div style={{display:'flex',borderBottom:'2px solid var(--border)'}}>
        <button onClick={function(){setRoleTab('owner');setErr('');}} style={roleTabStyle(roleTab==='owner')}>👑 Owner</button>
        <button onClick={function(){setRoleTab('crew');setErr('');}} style={roleTabStyle(roleTab==='crew')}>👷 Crew</button>
      </div>
      <div style={{padding:'22px 24px'}}>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <button onClick={function(){setMode('signin');setErr('');}} style={modeTabStyle(mode==='signin')}>Sign in</button>
          <button onClick={function(){setMode('signup');setErr('');}} style={modeTabStyle(mode==='signup')}>Sign up</button>
        </div>

        {mode==='signin' && <React.Fragment>
          <Field label="Quick login — PIN">
            <input inputMode="numeric" maxLength={6} placeholder="••••" value={f.pinInput}
              onChange={function(e){upd('pinInput', e.target.value.replace(/\D/g,''));}}
              onKeyDown={function(e){ if(e.key==='Enter') doPinLogin(); }}
              style={pinInputStyle}/>
          </Field>
          <button className="btn btn-primary" style={{width:'100%',padding:12,marginBottom:14}} onClick={doPinLogin}>Sign in with PIN</button>
          <div style={orStyle}>— or —</div>
          <Field label="Email"><input type="email" placeholder="you@email.com" value={f.email} onChange={function(e){upd('email',e.target.value);}}/></Field>
          <Field label="Password"><input type="password" value={f.pass} onChange={function(e){upd('pass',e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')doSignIn();}}/></Field>
          <button className="btn btn-primary" style={{width:'100%',padding:12}} onClick={doSignIn}>Sign in</button>
        </React.Fragment>}

        {mode==='signup' && <React.Fragment>
          <Field label="First name"><input value={f.first} onChange={function(e){upd('first',e.target.value);}}/></Field>
          {roleTab==='crew' && <Field label="Last name"><input value={f.last} onChange={function(e){upd('last',e.target.value);}}/></Field>}
          {roleTab==='crew' && <Field label="Job role">
            <select value={f.jobRole} onChange={function(e){upd('jobRole',e.target.value);}}>
              <option>Technician</option>
              <option>Sales Rep</option>
              <option>Crew lead</option>
              <option>Supervisor</option>
            </select>
          </Field>}
          <Field label="Email"><input type="email" value={f.email} onChange={function(e){upd('email',e.target.value);}}/></Field>
          <Field label="Password"><input type="password" placeholder="At least 6 characters" value={f.pass} onChange={function(e){upd('pass',e.target.value);}}/></Field>
          <button className="btn btn-primary" style={{width:'100%',padding:12}} onClick={doSignUp} disabled={busy}>{busy?'Creating account…':'Create account'}</button>
        </React.Fragment>}

        {roleTab==='owner' && <React.Fragment>
          <div style={orStyle}>— or —</div>
          <button className="btn" style={{width:'100%',padding:11,display:'flex',alignItems:'center',justifyContent:'center',gap:10}} onClick={doGoogle}>
            <GoogleIcon/> Continue with Google
          </button>
        </React.Fragment>}

        {err ? <div style={errStyle}>{err}</div> : null}
      </div>
    </div>
  </div>;
}

function GoogleIcon(){

var wrapStyle = {minHeight:'100vh',background:'linear-gradient(135deg,#0D1B2A 0%,#152238 60%,#1a2d4a 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:20};

<script type="text/babel" data-presets="react">
// ═══════════════════════════════════════════════════════════════
// APP ROOT — routing, providers, migration tool
// ═══════════════════════════════════════════════════════════════
function MigrationBanner(){
  var _running = React.useState(false), running = _running[0], setRunning = _running[1];
  var _log = React.useState([]), log = _log[0], setLog = _log[1];
  var _done = React.useState(false), done = _done[0], setDone = _done[1];
  var _dismissed = React.useState(localStorage.getItem('njp_v2_migration_dismissed')==='1'), dismissed=_dismissed[0], setDismissed=_dismissed[1];

  async function run(){
    setRunning(true); setLog([]);
    await migrateLegacyData(function(msg){ setLog(function(l){return l.concat([msg]);}); });
    setRunning(false); setDone(true);
  }
  function dismiss(){ localStorage.setItem('njp_v2_migration_dismissed','1'); setDismissed(true); }

  if (dismissed) return null;

  return <div className="card" style={{marginBottom:16,background:'var(--goldl)',border:'1px solid var(--gold)'}}>
    <div style={{fontWeight:800,color:'var(--goldd)',marginBottom:6}}>📦 Import your existing data</div>
    <div style={{fontSize:12,color:'var(--t2)',marginBottom:10}}>Pull all customers, jobs, revenue, expenses, quotes, invoices, and map pins from your previous CRM into this new system. Safe to run multiple times.</div>
    <div style={{display:'flex',gap:8}}>
      <button className="btn btn-gold" disabled={running} onClick={run}>{running?'Migrating…':'Run migration'}</button>
      <button className="btn" onClick={dismiss}>Dismiss</button>
    </div>
    {log.length ? <div style={{marginTop:10,fontSize:11,color:'var(--t2)',maxHeight:120,overflowY:'auto'}}>{log.map(function(l,i){return <div key={i}>{l}</div>;})}</div> : null}
    {done ? <div style={{marginTop:8,fontWeight:700,color:'var(--green)',fontSize:12}}>✓ Done — your data is now in the new system.</div> : null}
  </div>;
}

function OwnerDashboardWithMigration(){
  return <div><MigrationBanner/><OwnerDashboard/></div>;
}

function AppRoutes(){
  var auth = useAuth();
  return <Routes>
    <Route path="/login" element={auth.session && auth.profile ? <Navigate to="/" replace/> : <LoginPage/>}/>
    <Route path="/" element={<ProtectedRoute><RoleHomeSwitch/></ProtectedRoute>}/>
    <Route path="/customers" element={<ProtectedRoute roles={['owner','sales']}><CustomersPage/></ProtectedRoute>}/>
    <Route path="/leads" element={<ProtectedRoute roles={['owner','sales']}><LeadsPage/></ProtectedRoute>}/>
    <Route path="/quotes" element={<ProtectedRoute roles={['owner','sales']}><QuotesPage/></ProtectedRoute>}/>
    <Route path="/jobs" element={<ProtectedRoute><JobsPage/></ProtectedRoute>}/>
    <Route path="/schedule" element={<ProtectedRoute roles={['owner','sales','tech']}><SchedulePage/></ProtectedRoute>}/>
    <Route path="/invoices" element={<ProtectedRoute roles={['owner']}><InvoicesPage/></ProtectedRoute>}/>
    <Route path="/services" element={<ProtectedRoute roles={['owner']}><ServicesPage/></ProtectedRoute>}/>
    <Route path="/equipment" element={<ProtectedRoute roles={['owner']}><EquipmentPage/></ProtectedRoute>}/>
    <Route path="/team" element={<ProtectedRoute><TeamPage/></ProtectedRoute>}/>
    <Route path="/reports" element={<ProtectedRoute roles={['owner']}><ReportsPage/></ProtectedRoute>}/>
    <Route path="/map" element={<ProtectedRoute roles={['owner','sales']}><MapPage/></ProtectedRoute>}/>
    <Route path="*" element={<Navigate to="/" replace/>}/>
  </Routes>;
}

function RoleHomeSwitch(){
  var auth = useAuth();
  if (auth.role === 'owner') return <OwnerDashboardWithMigration/>;
  return <DashboardPage/>;
}

function App(){
  return <AuthProvider>
    <DataGate/>
  </AuthProvider>;
}

// Only mount the (heavy) DataProvider once we know we have a session — avoids
// hammering Supabase with reads before login on the public login screen.
function DataGate(){
  var auth = useAuth();
  if (auth.loading) return <Loading full/>;
  // Stay on the login/PIN-setup screen until BOTH a profile exists AND that
  // profile has a PIN saved — otherwise a brand-new signup would skip PIN
  // setup entirely and land on the dashboard with no PIN ever configured.
  var needsAuthFlow = !auth.session || !auth.profile || !auth.profile.pin;
  if (needsAuthFlow){
    return <HashRouter><Routes><Route path="*" element={<LoginPage/>}/></Routes></HashRouter>;
  }
  return <DataProvider>
    <HashRouter><AppRoutes/></HashRouter>
  </DataProvider>;
}

window.addEventListener('error', function(e){
  var el = document.getElementById('root');
  if (el && el.innerHTML.indexOf('Loading NJ Premium') !== -1){
    el.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0D1B2A;">' +
      '<div style="max-width:520px;background:#fff;border-radius:14px;padding:28px;text-align:center;">' +
